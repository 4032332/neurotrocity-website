<style>
  :root{
    --bg:#08080D; --panel:#101018; --line:#20202E;
    --ink:#F3F3F8; --muted:#8C8CA6;
    --volt:#7C6BFF; --cyan:#38E1D6;
    --sans:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .page{max-width:420px;margin:0 auto;padding-bottom:64px}

  .hero{position:relative;padding:64px 24px 96px;text-align:center;overflow:hidden;
    background:radial-gradient(120% 100% at 50% -10%,#17173a,var(--bg) 72%)}
  .hero canvas{position:absolute;inset:0;z-index:0;opacity:.9}
  .hero .veil{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 8%,transparent 46%,var(--bg) 92%)}
  .hero::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background-image:radial-gradient(rgba(124,107,255,.14) 1.5px,transparent 1.5px);background-size:26px 26px;opacity:.6}
  .avatar{position:relative;z-index:2;width:104px;height:104px;margin:0 auto 22px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 6px rgba(124,107,255,.08)}

  .name{position:relative;z-index:2;font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1.05;
    text-shadow:0 0 28px rgba(124,107,255,.55),0 0 60px rgba(56,225,214,.25)}
  .role{position:relative;z-index:2;margin-top:8px;font-size:14.5px;color:var(--muted)}
  .role .org{color:var(--cyan);font-weight:700}

  .quick{position:relative;z-index:2;display:flex;justify-content:center;gap:14px;margin-top:28px}
  .quick a{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);transition:transform .15s ease,border-color .15s ease}
  .quick a:hover{transform:translateY(-2px);border-color:var(--volt)}
  .quick svg{width:20px;height:20px;color:var(--cyan)}

  .save-wrap{padding:0 24px;margin-top:-28px;position:relative;z-index:3}
  .save{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:var(--panel);border:1px solid rgba(124,107,255,.4);color:var(--ink);font-weight:700;font-size:15px;
    padding:14px 20px;border-radius:14px;box-shadow:0 8px 18px -12px rgba(0,0,0,.6);
    transition:transform .18s ease,border-color .18s ease,background .18s ease}
  .save:hover{transform:translateY(-2px);border-color:var(--volt);background:#151527}
  .save svg{width:19px;height:19px;color:var(--cyan)}

  .card{margin:22px 24px 0;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .row{display:flex;flex-direction:column;gap:3px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .row .v{font-size:15.5px;font-weight:600}
  .row .v a{color:var(--cyan)}

  .foot{text-align:center;margin-top:28px;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .foot a{color:var(--muted)}
  .foot a:hover{color:var(--ink)}
</style>

<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce) return;
  var host = document.getElementById('hero'), c = document.getElementById('rob-net'), x = c.getContext('2d');
  var DPR = Math.min(1.5, devicePixelRatio || 1), W, H, T = 0;
  var PAL = [[150,130,255],[74,238,224],[255,120,205]];
  function rgba(col, a) { return 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + a + ')'; }
  function pick() { var r = Math.random(); return r < 0.55 ? PAL[0] : (r < 0.85 ? PAL[1] : PAL[2]); }

  var nodes, fibers, somas, signals;
  var CXn, CYn, SPAN;

  function addNode(px, py, depth, col) { nodes.push({ x: px, y: py, col: col, out: [], tw: Math.random()*6.28, ts: 0.01+Math.random()*0.015, energy: 0 }); return nodes.length-1; }
  function branch(pi, dir, len, depth, col) {
    if (depth > 4 || fibers.length > 90) return;
    var p = nodes[pi];
    var l = len * (0.8 + Math.random()*0.4);
    var ex = p.x + Math.cos(dir)*l, ey = p.y + Math.sin(dir)*l*0.9;
    var ni = addNode(ex, ey, depth, col);
    var mx = (p.x+ex)/2, my = (p.y+ey)/2, perp = dir+Math.PI/2, sway = (Math.random()-0.5)*l*0.4;
    var fi = { a: pi, b: ni, kx: mx+Math.cos(perp)*sway, ky: my+Math.sin(perp)*sway, col: col, w: Math.max(1,(4-depth)*1.3), energy: 0 };
    fibers.push(fi); p.out.push(fibers.length-1);
    var kids = depth < 2 ? (Math.random()<0.6?2:1) : (Math.random()<0.5?1:0);
    for (var k=0;k<kids;k++) branch(ni, dir+(Math.random()-0.5)*1.1, len*0.72, depth+1, col);
  }
  function grow() {
    nodes=[]; fibers=[]; somas=[]; signals=[];
    CXn = 0.5*W; CYn = 0.38*H; SPAN = Math.max(W,H);
    var hubs = 4;
    for (var h=0; h<hubs; h++) {
      var a = Math.random()*Math.PI*2, rr = Math.random()*SPAN*0.32;
      var hx = CXn+Math.cos(a)*rr, hy = CYn+Math.sin(a)*rr*0.8;
      var col = pick();
      var hi = addNode(hx, hy, 0, col);
      somas.push(hi);
      var prim = 4+(Math.random()*2|0);
      for (var i=0;i<prim;i++) branch(hi, (i/prim)*Math.PI*2+Math.random()*0.5, SPAN*0.24, 1, col);
    }
  }
  function size() {
    var r = host.getBoundingClientRect();
    W = c.width = Math.max(2, r.width*DPR); H = c.height = Math.max(2, r.height*DPR);
    c.style.width = r.width+'px'; c.style.height = r.height+'px';
    grow();
  }
  function fpt(f,t){var A=nodes[f.a],B=nodes[f.b],u=1-t;
    return {x:u*u*A.x+2*u*t*f.kx+t*t*B.x, y:u*u*A.y+2*u*t*f.ky+t*t*B.y};}
  function sendAlong(fi){ if (signals.length>18) return; var f=fibers[fi]; f.energy=1; signals.push({fi:fi,t:0,sp:0.012+Math.random()*0.012,col:f.col}); }
  function fireNode(ni){ var n=nodes[ni]; if(!n||!n.out.length) return; n.energy=1; sendAlong(n.out[(Math.random()*n.out.length)|0]); }

  function frame(){
    T++;
    x.clearRect(0,0,W,H);
    x.globalCompositeOperation = 'lighter';
    for (var i=0;i<fibers.length;i++){
      var f=fibers[i]; if(f.energy>0) f.energy*=0.95;
      var A=nodes[f.a],B=nodes[f.b],lit=f.energy;
      x.strokeStyle = rgba(lit>0.5?[255,255,255]:f.col, 0.28+lit*0.5); x.lineWidth = (f.w+lit*1.8)*DPR;
      x.lineCap='round';
      x.beginPath(); x.moveTo(A.x,A.y); x.quadraticCurveTo(f.kx,f.ky,B.x,B.y); x.stroke();
    }
    for (var i=0;i<nodes.length;i++){
      var n=nodes[i]; n.tw+=n.ts; if(n.energy>0) n.energy*=0.95;
      var tw=0.5+0.5*Math.sin(n.tw), bright=0.5+0.5*tw+n.energy*0.9;
      var r=(2.6+n.energy*2.6)*DPR;
      x.fillStyle=rgba(n.col, Math.min(1,bright)*0.85); x.beginPath(); x.arc(n.x,n.y,r*2.6,0,7); x.fill();
      x.fillStyle=rgba([255,255,255], Math.min(1,bright)*0.9); x.beginPath(); x.arc(n.x,n.y,r,0,7); x.fill();
    }
    for (var k=signals.length-1;k>=0;k--){
      var s=signals[k]; s.t+=s.sp; var f=fibers[s.fi];
      if (s.t>=1){ fireNode(f.b); signals.splice(k,1); continue; }
      var p=fpt(f,s.t);
      x.fillStyle=rgba([255,255,255],0.9); x.beginPath(); x.arc(p.x,p.y,2.2*DPR,0,7); x.fill();
    }
    if (Math.random() < 0.02) fireNode(somas[(Math.random()*somas.length)|0]);
    x.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
  }
  size(); addEventListener('resize', size);
  frame();
})();
</script>
